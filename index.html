<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Tori 💌</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #1a1a2e, #0f3460);
      font-family: 'Dancing Script', cursive;
      overflow: hidden;
    }

    /* soft glowing background dots */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: url("https://www.transparenttextures.com/patterns/stardust.png");
      opacity: 0.2;
    }

    .envelope {
      position: relative;
      width: 220px;
      height: 140px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      transition: all 0.4s ease;
    }

    .envelope:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 25px 60px rgba(255, 105, 135, 0.6);
    }

    /* top flap */
    .envelope::before {
      content: "";
      position: absolute;
      top: -70px;
      left: 0;
      width: 0;
      height: 0;
      border-left: 110px solid transparent;
      border-right: 110px solid transparent;
      border-bottom: 70px solid #ff758c;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
    }

    /* inner heart */
    .heart {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      color: white;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .text {
      position: absolute;
      width: 100%;
      text-align: center;
      bottom: 10px;
      color: #fff;
      font-size: 20px;
      letter-spacing: 1px;
    }

  </style>
</head>
<body>

  <div class="envelope" onclick="openLetter()">
    <div class="heart">❤️</div>
    <div class="text">Heyyy Toriii</div>
  </div>

  <script>
    function openLetter() {
      window.location.href = "letter.html";
    }
  </script>

</body>
</html>
